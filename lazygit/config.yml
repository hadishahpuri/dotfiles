gui:
  screenMode: "half"
customCommands:
  - key: "c"
    context: "files"
    prompts:
      - type: "menu"
        title: "Choose your commit type:"
        key: "CommitType"
        options:
          - name: "✨ FEATURE"
            value: "✨"
          - name: "\U0001F41B BUG"
            value: "\U0001F41B"
          - name: "\U0001F691️ HOTFIX"
            value: "\U0001F691️"
          - name: "\U0001F3A8 CHANGED"
            value: "\U0001F3A8"
          - name: "\U0001F512️ SECURITY"
            value: "\U0001F512️"
          - name: "⬆️ BUMPED"
            value: "⬆️"
          - name: "\U0001F6A7 WIP"
            value: "\U0001F6A7"
          - name: "\U0001F525 REMOVED"
            value: "\U0001F525"
          - name: "\U0001F389 INITIAL"
            value: "\U0001F389"
      - type: "input"
        title: "Enter your commit ID"
        key: "CommitId"
        suggestions:
          command: "git rev-parse --abbrev-ref HEAD | sed 's/^[a-zA-Z]*\\/\\(IQ-[0-9]*\\).*/\\1/'"
      - type: "input"
        title: "Enter your commit message"
        key: "CommitMessage"
        initialValue: ""
      - type: "menu"
        title: "Pre commit msg hook?"
        key: "PreCommitHook"
        options:
          - name: "Yes"
            value: ""
          - name: "No"
            value: "--no-verify"
    command: "git commit -m '{{.Form.CommitType}} [{{.Form.CommitId}}] {{.Form.CommitMessage}}' {{.Form.PreCommitHook}}"
    loadingText: "Commiting..."
    output: terminal
  - key: "n"
    context: "localBranches"
    prompts:
      - type: "menu"
        title: "Choose your branch type:"
        key: "BranchType"
        options:
          - name: "✨ FEATURE"
            value: "feature"
          - name: "\U0001F41B BUG"
            value: "bugFix"
          - name: "\U0001F691️ HOTFIX"
            value: "hotFix"
      - type: "input"
        title: "Enter your task ID"
        key: "TaskId"
        initialValue: ""
      - type: "input"
        title: "Enter your branch name"
        key: "BranchName"
        initialValue: ""
    command: sh -c 'git checkout -b "$(echo "{{.Form.BranchType}}/IQ-{{.Form.TaskId}}-{{.Form.BranchName}}" | sed "s/ /-/g")"'
    loadingText: "Creating new branch..."
    output: terminal
  - key: "<c-p>"
    context: "global"
    prompts:
      - type: "input"
        title: "Choose your target branch"
        key: "Target"
        suggestions:
          preset: "branches"
        initialValue: "develop"
      - type: "menu"
        title: "Assignee"
        key: "Assignee"
        options:
          - name: "Me"
            value: ""
          - name: "Hamed"
            value: "11276575"
          - name: "Amin"
            value: "11276572"
      - type: "menu"
        title: "Reviewer"
        key: "Reviewer"
        options:
          - name: "None"
            value: ""
          - name: "Hamed"
            value: "11276575"
          - name: "Amin"
            value: "11276572"
    command: "~/dotfiles/lazygit/merge_request.sh '{{.Form.Target}}' '{{.Form.Assignee}}' '{{.Form.Reviewer}}'"
    loadingText: "Creating merge request..."
    output: terminal
git:
  pagers:
    - externalDiffCommand: difft --color=always --display=inline --syntax-highlight=on
